services:
  - type: worker
    name: pumpscan-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: NTFY_TOPIC
        sync: false
      - key: POLL_SEC
        value: "30"
      - key: MIN_LIQ
        value: "1500"
